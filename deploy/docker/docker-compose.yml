services:
  umans-gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Match the host owner of the ./config directory so the container can
      # read/write the bind-mounted config. Change these if your host user is
      # not UID/GID 1000.
      PUID: 1000
      PGID: 1000
      UMANS_LOG_LEVEL: INFO
      # Container local time. Error-event files are bucketed by local hour, so
      # this controls which YYYYMMDD-HH.jsonl file an event lands in. Override
      # if you need a different timezone.
      TZ: Asia/Shanghai
    volumes:
      - ../../config:/data/config
      - umans-error-events:/data/error-events

volumes:
  umans-error-events:
